# -----------------------------------------------------------------------------
# Automation: Bridge Hue proxy scenes to the correct Nilsreiter script.
# Uses the proxy scene's friendly name as the scene name to pass through.
# -----------------------------------------------------------------------------
alias: Bridge Hue Card → Nilsreiter
id: bridge_hue_card_to_nilsreiter
mode: single

# -----------------------------------------------------------------------------
# Trigger: Fires whenever a scene is turned on.
# -----------------------------------------------------------------------------
trigger:
  - platform: event
    event_type: call_service
    event_data:
      domain: scene
      service: turn_on

# -----------------------------------------------------------------------------
# Variables
# -----------------------------------------------------------------------------
variables:
  eid: >-
    {% set sd = trigger.event.data.service_data %}
    {% if sd is mapping %}
      {% if sd.entity_id is string %}
        {{ sd.entity_id }}
      {% elif sd.entity_id is iterable and sd.entity_id | count > 0 %}
        {{ sd.entity_id[0] }}
      {% else %}
        {{ '' }}
      {% endif %}
    {% else %}
      {{ '' }}
    {% endif %}

  scene_name: >-
    {% if eid in states %}
      {{ states[eid].name }}
    {% else %}
      {{ '' }}
    {% endif %}

# -----------------------------------------------------------------------------
# Conditions: Only handle the Hue proxy scenes.
# -----------------------------------------------------------------------------
condition:
  - condition: template
    value_template: >-
      {{
        eid | regex_match(
          '^scene\\.(all_)?(cozy|daily|defaults|dreamy|futuristic|halloween|lush|luxurious|party_vibes|peaceful|pure|race_day|refreshing|romantic|serenity|sunrise|winter_holidays)_'
        )
      }}

# -----------------------------------------------------------------------------
# Actions: Route All Hue scenes to script.all_hue_scenes, everything else to
# script.main_hue_scenes.
# -----------------------------------------------------------------------------
action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ eid.startswith('scene.all_') }}"
        sequence:
          - service: script.turn_on
            target:
              entity_id: script.all_hue_scenes
            data:
              variables:
                scene: "{{ scene_name }}"

    default:
      - service: script.turn_on
        target:
          entity_id: script.main_hue_scenes
        data:
          variables:
            scene: "{{ scene_name }}"