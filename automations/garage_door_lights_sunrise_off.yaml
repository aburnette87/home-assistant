# -----------------------------------------------------------------------------
# Automation: Turns off the exterior garage door lights when the sun rises.
# -----------------------------------------------------------------------------
alias: Garage Outside Lights off in the Morning
id: "garage_outside_lights_off_in_the_morning"
mode: single

# -----------------------------------------------------------------------------
# Triggers: Fires precisely at sunrise, based on the sun integration.
# -----------------------------------------------------------------------------
trigger:
  - platform: sun
    event: sunrise
    offset: "00:00:00"

# -----------------------------------------------------------------------------
# Conditions: None defined — automation always triggers at sunrise.
# -----------------------------------------------------------------------------
condition: []

# -----------------------------------------------------------------------------
# Actions: Turns off the garage lights via the associated switch.
# -----------------------------------------------------------------------------
action:
  - service: switch.turn_off
    target:
      entity_id: switch.garage_door_lights
