# -----------------------------------------------------------------------------
# Automation: Arrival / Leave-Work Pre-Conditioning + Sleep Mode
# -----------------------------------------------------------------------------
alias: Arrival + Workday Pre-Conditioning + Sleep
id: econet_arrival_workday_precool_sleep
mode: single

# -----------------------------------------------------------------------------
# Variables:
# -----------------------------------------------------------------------------
variables:
  climate_entity: climate.thermostat
  workday_entity: binary_sensor.workday_sensor
  # alarm_entity: alarm_control_panel.skycontrol_panel
  current_temp: "{{ state_attr(climate_entity, 'current_temperature')|float(0) }}"
  is_off: "{{ is_state(climate_entity, 'off') }}"
  is_workday: "{{ is_state(workday_entity, 'on') }}"
  after_11pm: "{{ now().hour >= 23 }}"
  target_mid: 70

# -----------------------------------------------------------------------------
# Triggers: Fires when any of these are met.
#  1) "am home" (fires on any change *to* home)
#  2) arrive home: explicit not_home -> home edge
#  3) pre-cool/heat: leave work (only relevant on workdays)
#  4) Arm Stay after 11pm
#  5) 11:00 PM tick (if already armed_stay)
# -----------------------------------------------------------------------------
trigger:
  - id: am_home
    platform: state
    entity_id: person.andrew
    to: "home"

  - id: arrive_home
    platform: state
    entity_id: person.andrew
    from: "not_home"
    to: "home"

  - id: leave_work
    platform: zone
    entity_id: person.andrew
    zone: zone.work
    event: leave

  - id: arm_stay_after_11
    platform: state
    entity_id: alarm_control_panel.skycontrol_panel
    to: armed_stay

  - id: eleven_pm_tick
    platform: time
    at: "23:00:00"

# -----------------------------------------------------------------------------
# Conditions:
#  0) A/C is in an "off" state  (sleep mode is allowed regardless)
#  Presence/trigger logic:
#  1) (I am home) OR (arrive_home) OR (leave_work)
# -----------------------------------------------------------------------------
condition:
  - condition: or
    conditions:
      - condition: template
        value_template: >
          {{ trigger.id in ['arm_stay_after_11','eleven_pm_tick'] }}
      - condition: template
        value_template: "{{ is_off }}"

  - condition: or
    conditions:
      - condition: state
        entity_id: person.andrew
        state: "home"
      - condition: template
        value_template: "{{ trigger.id == 'arrive_home' }}"
      - condition: template
        value_template: "{{ trigger.id == 'leave_work' }}"

# -----------------------------------------------------------------------------
# Actions: Turns on the A/C based on condition.
#  SLEEP MODE:
#  WHEN alarm is armed_stay AND time is 11:00 PM or later
#  THEN set mode heat_cool and band 67–69
#  ----------------------------------------------------------------------------
#  LEAVING WORK PRE-COOL (workday only):
#  IF temp > 70 AND mode is off -> cool to 70
#  ----------------------------------------------------------------------------
#  LEAVING WORK PRE-HEAT (workday only):
#  IF temp < 70 AND mode is off -> heat to 70
# -----------------------------------------------------------------------------
action:
  - choose:
      - conditions:
          - condition: state
            entity_id: alarm_control_panel.skycontrol_panel
            state: armed_stay
          - condition: template
            value_template: "{{ after_11pm }}"
        sequence:
          - service: climate.set_hvac_mode
            target: { entity_id: "{{ climate_entity }}" }
            data: { hvac_mode: heat_cool }
          - service: climate.set_temperature
            target: { entity_id: "{{ climate_entity }}" }
            data:
              target_temp_high: 69
              target_temp_low: 67

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'leave_work' }}"
          - condition: template
            value_template: "{{ is_workday }}"
          - condition: template
            value_template: "{{ is_off }}"
          - condition: template
            value_template: "{{ current_temp > target_mid }}"
        sequence:
          - service: climate.set_hvac_mode
            target: { entity_id: "{{ climate_entity }}" }
            data: { hvac_mode: cool }
          - delay: "00:00:02"
          - service: climate.set_temperature
            target: { entity_id: "{{ climate_entity }}" }
            data: { temperature: "{{ target_mid }}" }

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'leave_work' }}"
          - condition: template
            value_template: "{{ is_workday }}"
          - condition: template
            value_template: "{{ is_off }}"
          - condition: template
            value_template: "{{ current_temp < target_mid }}"
        sequence:
          - service: climate.set_hvac_mode
            target: { entity_id: "{{ climate_entity }}" }
            data: { hvac_mode: heat }
          - delay: "00:00:02"
          - service: climate.set_temperature
            target: { entity_id: "{{ climate_entity }}" }
            data: { temperature: "{{ target_mid }}" }

    default: []
