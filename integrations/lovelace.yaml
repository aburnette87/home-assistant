lovelace:
  resource_mode: yaml
  resources:
    - url: /hacsfiles/hass-hue-icons/hass-hue-icons.js
      type: module
    - url: /hacsfiles/lovelace-hue-like-light-card/hue-like-light-card.js
      type: module

  dashboards:
    dashboard-lovelace:
      mode: yaml
      filename: dashboards/ui-lovelace.yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: true
      require_admin: false

    dashboard-lights:
      mode: yaml
      filename: dashboards/light-control.yaml
      title: Light Control
      icon: hue:bulb-group-classic-4-alt
      show_in_sidebar: true
      require_admin: false

    dashboard-sensors:
      mode: yaml
      filename: dashboards/sensor-data.yaml
      title: Sensor Data
      icon: hue:outdoor-motion-sensor-temperature
      show_in_sidebar: true
      require_admin: false

    dashboard-map:
      mode: yaml
      filename: dashboards/map.yaml
      title: Map
      icon: mdi:map
      show_in_sidebar: true
      require_admin: false
